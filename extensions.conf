  GNU nano 8.4               /etc/asterisk/extensions.conf
[internal]

; --- Routage Utilisateur 100 ---
exten => 100,1,GotoIfTime(09:00-17:59,*,*,*?ouvert100)
exten => 100,2,VoiceMail(100@default,u)
exten => 100,3,Hangup()

exten => 100,n(ouvert100),Dial(PJSIP/100,20)
exten => 100,n,VoiceMail(100@default,u)
exten => 100,n,Hangup()

; --- Routage Utilisateur 200 ---
exten => 200,1,GotoIfTime(09:00-17:59,*,*,*?ouvert200)
exten => 200,2,VoiceMail(200@default,u)
exten => 200,3,Hangup()

exten => 200,n(ouvert200),Dial(PJSIP/200,20)
exten => 200,n,VoiceMail(200@default,u)
exten => 200,n,Hangup()

; --- Menu Interactif (SVI) sur le numéro 800 ---
exten => 800,1,Answer()
exten => 800,2,Background(dir-intro)
exten => 800,3,WaitExten(5)

; Choix 1 : Compte (Renvoi vers 100)
exten => 1,1,Playback(digits/1)
exten => 1,2,Goto(internal,100,1)

; Choix 2 : RH (Renvoi vers 200)
exten => 2,1,Playback(digits/2)
exten => 2,2,Goto(internal,200,1)

; Erreur ou Timeout SVI
exten => t,1,Playback(vm-goodbye)
exten => t,2,Hangup()
exten => i,1,Playback(pbx-invalid)
exten => i,2,Goto(800,1)
